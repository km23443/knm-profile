<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>註冊 — Profile Builder</title>
<link rel="stylesheet" href="/static/admin.css" />
</head>
<body>
<main class="auth-wrap">
  <div class="auth-card">
    <h1>建立帳號</h1>
    <p class="subtitle">幾秒鐘就能擁有自己的介紹頁</p>

    <div class="alert alert-error" id="alert"></div>

    <form id="registerForm">
      <div class="field">
        <label class="float">帳號 (3-30 字)</label>
        <input type="text" name="username" required minlength="3" maxlength="30" placeholder="choose a username" autocomplete="username" />
      </div>
      <div class="field">
        <label class="float">密碼 (至少 6 字)</label>
        <input type="password" name="password" required minlength="6" placeholder="strong password" autocomplete="new-password" />
        <div class="help">這只用於登入管理頁面，與你公開頁面的網址不同</div>
      </div>
      <button type="submit" class="btn btn-block">建立我的帳號</button>
    </form>

    <p style="text-align:center; margin-top: 22px; color: var(--fg-mute); font-size: 14px;">
      已有帳號？ <a class="muted-link" href="/login">前往登入</a>
    </p>
  </div>
</main>

<script>
const form = document.getElementById('registerForm');
const alertBox = document.getElementById('alert');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  alertBox.classList.remove('show');
  const fd = new FormData(form);
  const body = { username: fd.get('username').trim(), password: fd.get('password') };
  try {
    const r = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await r.json();
    if (!r.ok) {
      alertBox.textContent = data.error || '註冊失敗';
      alertBox.classList.add('show');
      return;
    }
    location.href = data.redirect || '/admin';
  } catch (err) {
    alertBox.textContent = '網路錯誤，請稍後再試';
    alertBox.classList.add('show');
  }
});
</script>
</body>
</html>
